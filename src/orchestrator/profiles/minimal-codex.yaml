name: minimal-codex

agent:
  backend: codex_cli
  sterile_context: true
  permission_mode: workspace-write

stages:
  - stage: specification
    prompt: prompts/specification/minimal.md

  - stage: decomposition
    prompt: prompts/decomposition/minimal.md

  - stage: implementation
    prompt: prompts/implementation/minimal.md
    standards: true
    cwd_from_repo_root: true
    agent:
      # Implementation must `git add` / `git commit`; workspace-write blocks .git writes.
      permission_mode: danger-full-access

  - stage: verification
    mode: deterministic

  - stage: review
    expansion: prompts
    prompts:
      implementation: prompts/review/implementation.md
