name: minimal-claude

agent:
  backend: claude_code
  model: claude-opus-4-7

pr_draft:
  agent:
    model: claude-sonnet-4-6

stages:
  - stage: specification
    prompt: prompts/specification/minimal.md

  - stage: decomposition
    prompt: prompts/decomposition/minimal.md

  - stage: implementation
    prompt: prompts/implementation/minimal.md
    standards: true
    cwd_from_repo_root: true

  - stage: verification
    mode: deterministic

  - stage: review
    expansion: prompts
    prompts:
      implementation: prompts/review/implementation.md
