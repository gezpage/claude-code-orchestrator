name: minimal
stages:
  - stage: specification
    prompt: prompts/specification/minimal.md

  - stage: decomposition
    prompt: prompts/decomposition/default.md

  - stage: implementation
    prompt: prompts/implementation/default.md
    standards: true
    expansion: slices
    slices_from_stage: decomposition
    cwd_from_repo_root: true

  - stage: verification
    mode: deterministic

  - stage: review
    expansion: prompts
    prompts:
      implementation: prompts/review/implementation.md
