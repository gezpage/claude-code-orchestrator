toolchain: typescript
priority: 60

# `markers` must ALL be present; at least one `any_markers` entry must be present.
# package.json is required (TypeScript projects are npm/yarn/pnpm ecosystems).
# Any of the TypeScript-specific files confirms the project is TypeScript, not plain JS.
markers:
  - package.json

any_markers:
  - tsconfig.json
  - vite.config.ts
  - vitest.config.ts
  - jest.config.ts
  - src/**/*.ts
  - src/**/*.tsx

commands:
  - id: test
    command: npm test
    required: true
    if_script_exists: test

  - id: typecheck
    command: npm run typecheck
    required: false
    if_script_exists: typecheck

  - id: lint
    command: npm run lint
    required: false
    if_script_exists: lint

  - id: build
    command: npm run build
    required: false
    if_script_exists: build

probes:
  - node_manifest_sanity
