toolchain: java
priority: 50

# Java projects are identified by the presence of any common Maven or Gradle
# build marker. No single file is required — any one match is sufficient.
any_markers:
  - pom.xml
  - build.gradle
  - build.gradle.kts
  - settings.gradle
  - settings.gradle.kts
  - gradlew
  - mvnw
  - src/test/java

commands:
  # Maven wrapper — preferred over plain `mvn` when the wrapper script is present.
  - id: test_mvnw
    command: ./mvnw test
    required: true
    if_file_exists: mvnw

  # Maven direct — used only when the wrapper script is absent.
  - id: test_maven
    command: mvn test
    required: true
    if_file_exists: pom.xml
    if_file_not_exists: mvnw

  # Gradle wrapper — preferred over plain `gradle` when the wrapper script is present.
  - id: test_gradlew
    command: ./gradlew test
    required: true
    if_file_exists: gradlew

  # Gradle direct — used only when the wrapper script is absent.
  # Matches both Groovy DSL (build.gradle) and Kotlin DSL (build.gradle.kts).
  - id: test_gradle
    command: gradle test
    required: true
    if_file_exists: "build.gradle*"
    if_file_not_exists: gradlew
