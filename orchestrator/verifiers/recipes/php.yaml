toolchain: php
priority: 50

# composer.json is the foundational marker for any modern PHP project that
# wants reproducible deps and a test runner. We deliberately do not match on
# phpunit.xml alone — a stray phpunit.xml in a Node or Python repo (e.g. a
# fixture or scaffold) would otherwise mis-detect as PHP.
markers:
  - composer.json

# Either composer-script style or direct phpunit invocation works; each is
# guarded by its own precondition so the alternative path can still apply
# when only one is configured. They sit in the `required_any_of` group so the
# engine knows the recipe is asserting "at least one of these IS the test".
# If neither runs the result downgrades to `warned` (not `passed`) — a
# composer.json repo with no test entrypoint and no installed phpunit is
# false-confidence territory, not a clean pass. If either actually runs and
# fails, the run is `failed` — even though the individual command carries
# `required: false` so the alternative path stays optional.
required_any_of:
  - composer-test
  - phpunit

commands:
  - id: composer-test
    command: composer test
    required: false
    if_composer_script_exists: test

  - id: phpunit
    command: vendor/bin/phpunit
    required: false
    if_file_exists: vendor/bin/phpunit
