name: Release

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest semver tag
        id: latest
        run: |
          TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          echo "tag=${TAG:-v0.0.0}" >> $GITHUB_OUTPUT

      - name: Determine bump from commits since last tag
        id: bump
        run: |
          TAG="${{ steps.latest.outputs.tag }}"
          if [ "$TAG" = "v0.0.0" ]; then
            RANGE="HEAD"
          else
            RANGE="${TAG}..HEAD"
          fi
          MSGS=$(git log --format=%B "$RANGE")
          if echo "$MSGS" | grep -qE '^feat!:|BREAKING CHANGE'; then
            echo "bump=major" >> $GITHUB_OUTPUT
          elif echo "$MSGS" | grep -qE '^feat:'; then
            echo "bump=minor" >> $GITHUB_OUTPUT
          elif echo "$MSGS" | grep -qE '^fix:'; then
            echo "bump=patch" >> $GITHUB_OUTPUT
          else
            echo "::error::No release-bearing commits (feat!:, feat:, fix:, or BREAKING CHANGE) found in range ${RANGE}. Nothing to release."
            exit 1
          fi

      - name: Compute next version
        id: next
        run: |
          TAG="${{ steps.latest.outputs.tag }}"
          BUMP="${{ steps.bump.outputs.bump }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "${TAG#v}"
          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          echo "version=v${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Format
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy orchestrator/

      - name: Test
        run: uv run pytest tests/

      - name: Build wheel and sdist
        run: uv build

      - name: Install wheel
        run: pip install dist/*.whl

      - name: Smoke test
        run: orchestrator --help

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.next.outputs.version }}"
          PREVIOUS="${{ steps.latest.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"
          if [ "$PREVIOUS" = "v0.0.0" ]; then
            gh release create "$VERSION" --title "$VERSION" --generate-notes
          else
            gh release create "$VERSION" --title "$VERSION" --generate-notes --notes-start-tag "$PREVIOUS"
          fi
